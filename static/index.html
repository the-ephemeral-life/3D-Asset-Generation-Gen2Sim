<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Asset Generation - Gen2Sim</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>3D Asset Generation - Gen2Sim</h1>
        <div class="header-actions">
            <button id="resetBtn" class="theme-toggle" style="margin-right: 0.5rem; color: #dc2626; border-color: #fecaca;">🗑️ Reset Spawning</button>
            <button id="themeToggle" class="theme-toggle">🌙 Dark Mode</button>
        </div>
    </header>

    <div class="card">
        <form id="uploadForm">
            <div class="input-row">
                <div class="input-group">
                    <label for="dimensionInput">Size (m)</label>
                    <input type="number" id="dimensionInput" value="1.0" min="0.1" step="0.1">
                </div>
                <div class="input-group">
                    <label for="xInput">X</label>
                    <input type="number" id="xInput" value="0.0" step="0.1">
                </div>
                <div class="input-group">
                    <label for="yInput">Y</label>
                    <input type="number" id="yInput" value="0.0" step="0.1">
                </div>
                <div class="input-group">
                    <label for="zInput">Z</label>
                    <input type="number" id="zInput" value="0.5" step="0.1">
                </div>
            </div>
            
            <div class="upload-area" id="dropZone">
                <div class="upload-placeholder">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <p>Click or drag image to upload</p>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <img id="preview" src="" alt="Preview">
            </div>
            
            <button type="submit" id="submitBtn">Generate 3D Model</button>
        </form>
        <div id="status"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
