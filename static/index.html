<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen2Sim | Robotic Asset Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">
    
    <header class="w-full max-w-5xl flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-violet-400 tracking-tight">Gen2Sim Master</h1>
            <p class="text-slate-400 text-sm font-semibold">Automated Image-to-Gazebo Pipeline</p>
        </div>
        <button id="resetBtn" class="px-4 py-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 rounded-xl text-sm font-bold transition-all">
            Reset Registry
        </button>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Left: Controls -->
        <div class="lg:col-span-5 space-y-6">
            <div class="glass rounded-3xl p-6 shadow-2xl">
                <form id="genForm" class="space-y-6">
                    
                    <!-- Image Upload -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Reference Image</label>
                        <div id="dropZone" class="relative group cursor-pointer border-2 border-dashed border-slate-700 hover:border-blue-500/50 rounded-2xl p-4 transition-all bg-slate-800/30">
                            <input type="file" id="fileInput" accept="image/*" class="hidden">
                            <div id="uploadPreview" class="hidden">
                                <img src="" id="previewImg" class="w-full h-48 object-contain rounded-lg">
                            </div>
                            <div id="uploadPrompt" class="flex flex-col items-center py-8 space-y-3">
                                <svg class="w-10 h-10 text-slate-500 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                <span class="text-sm font-semibold text-slate-400">Click to upload reference</span>
                            </div>
                        </div>
                    </div>

                    <!-- Config Grid -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Target Scale</label>
                            <input type="number" id="scaleInput" value="1.0" step="0.1" min="0.1" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Spawn Z (Alt)</label>
                            <input type="number" id="zInput" value="0.5" step="0.1" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Spawn Origin (X, Y)</label>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="xInput" value="0.0" step="0.1" placeholder="X" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all">
                            <input type="number" id="yInput" value="0.0" step="0.1" placeholder="Y" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white rounded-2xl font-bold text-lg shadow-lg shadow-blue-900/20 transform transition-all active:scale-95 flex items-center justify-center space-x-3">
                        <span>Generate & Spawn</span>
                    </button>
                </form>
            </div>

            <!-- Download Section -->
            <div id="downloadSection" class="hidden glass rounded-3xl p-6 animate-in slide-in-from-bottom duration-500">
                <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">Generated Assets</h3>
                <div id="assetGrid" class="grid grid-cols-2 gap-3">
                    <!-- Dynamic buttons -->
                </div>
            </div>
        </div>

        <!-- Right: Log -->
        <div class="lg:col-span-7 flex flex-col h-full min-h-[600px]">
            <div class="flex-1 glass rounded-3xl p-4 flex flex-col relative overflow-hidden">
                <div class="flex items-center justify-between mb-3 px-2">
                    <div class="flex items-center space-x-2">
                        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Live Status Log</span>
                    </div>
                    <button id="clearLog" class="text-[10px] text-slate-600 hover:text-slate-400 font-bold uppercase">Clear</button>
                </div>
                <div id="log" class="flex-1 mono text-[13px] leading-relaxed p-4 bg-black/40 rounded-2xl overflow-y-auto whitespace-pre-wrap text-blue-100/80 border border-white/5">
                    <div class="text-slate-500 italic">Waiting for command...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const logEl = document.getElementById('log');
        const genForm = document.getElementById('genForm');
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('previewImg');
        const uploadPreview = document.getElementById('uploadPreview');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const dropZone = document.getElementById('dropZone');
        const submitBtn = document.getElementById('submitBtn');
        const downloadSection = document.getElementById('downloadSection');
        const assetGrid = document.getElementById('assetGrid');

        // Utils
        const log = (msg, type = 'info') => {
            const div = document.createElement('div');
            div.className = `mb-1 ${type === 'error' ? 'text-red-400' : type === 'success' ? 'text-green-400 font-bold' : ''}`;
            div.textContent = msg.replace('data: ', '');
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        };

        // UI Interactions
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                previewImg.src = url;
                uploadPreview.classList.remove('hidden');
                uploadPrompt.classList.add('hidden');
            }
        };

        document.getElementById('clearLog').onclick = () => logEl.innerHTML = '';
        document.getElementById('resetBtn').onclick = async () => {
            if (confirm('Reset spawning origin?')) {
                await fetch('/api/reset', { method: 'POST' });
                log('[*] Registry cleared.', 'success');
            }
        };

        // Orchestration
        genForm.onsubmit = async (e) => {
            e.preventDefault();
            if (!fileInput.files[0]) return alert('Select an image');

            // Reset UI
            logEl.innerHTML = '';
            downloadSection.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="loader w-5 h-5 border-2 border-white/20 rounded-full"></div><span>Processing Pipeline...</span>';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('scale', document.getElementById('scaleInput').value);
            formData.append('x', document.getElementById('xInput').value);
            formData.append('y', document.getElementById('yInput').value);
            formData.append('z', document.getElementById('zInput').value);

            try {
                const response = await fetch('/api/generate', { method: 'POST', body: formData });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n');
                    
                    lines.forEach(line => {
                        if (!line.trim()) return;
                        
                        // Parse assets if present
                        if (line.includes('---ASSETS_START---')) {
                            const assetStr = line.split('---ASSETS_START---')[1].split('---ASSETS_END---')[0];
                            showAssets(JSON.parse(assetStr));
                        } else if (line.includes('[SUCCESS]')) {
                            log(line, 'success');
                        } else if (line.includes('[!]')) {
                            log(line, 'error');
                        } else {
                            log(line);
                        }
                    });
                }
            } catch (err) {
                log(`[!] Network Error: ${err.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Generate & Spawn</span>';
            }
        };

        function showAssets(assets) {
            assetGrid.innerHTML = '';
            const labels = { glb: 'GLB Mesh', visual: 'Visual OBJ', collision: 'Collision OBJ', sdf: 'Model SDF', texture: 'Texture' };
            
            Object.entries(assets).forEach(([key, url]) => {
                const a = document.createElement('a');
                a.href = url;
                a.download = url.split('/').pop();
                a.className = "flex items-center justify-between p-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-[11px] font-bold transition-all transform hover:-translate-y-0.5";
                a.innerHTML = `
                    <span class="text-slate-300 uppercase">${labels[key]}</span>
                    <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                `;
                assetGrid.appendChild(a);
            });
            downloadSection.classList.remove('hidden');
        }
    </script>
</body>
</html>
